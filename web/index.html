/* 다크/화이트 세그먼트 버튼 */
.themeseg{display:flex;gap:5px;margin:0 0 12px}
.calwrap{margin-top:6px}
.tipcard{background:linear-gradient(135deg,rgba(201,139,255,.12),var(--panel2));border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.tip-h{font-size:11px;font-weight:800;color:#c98bff;margin-bottom:7px;letter-spacing:-.2px}
.tip-term{font-size:14px;font-weight:800;color:var(--ink);display:flex;align-items:baseline;flex-wrap:wrap;gap:7px}
.tip-full{font-size:10.5px;font-weight:500;color:var(--muted)}
.tip-desc{font-size:12px;color:var(--ink2);line-height:1.6;margin-top:6px}
.tip-more{margin-top:9px;font-size:11px;padding:5px 11px;border-radius:8px;border:1px solid var(--line2);background:var(--panel);color:var(--ink2);cursor:pointer}
.tip-more:hover{border-color:var(--teal);color:var(--teal)}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin:8px 0 12px;padding:10px 12px;
background:linear-gradient(135deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px}
.cal-title{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.3px}
.cal-nav{background:var(--bg);border:1px solid var(--line2);color:var(--ink2);width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:17px;line-height:1;transition:all .15s}
.cal-nav:hover{border-color:var(--teal);color:var(--teal);transform:scale(1.05)}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;width:100%;box-sizing:border-box}
/* 항상 6주 고정: 요일헤더(auto) + 날짜 6줄(균등 고정). 매달 달력 크기 동일 */
.cal-grid-6w{grid-template-rows:auto repeat(6,1fr)}
.cal-dcell{text-align:center;font-size:11px;font-weight:600;color:var(--muted);padding:2px 0 5px;align-self:center;min-width:0;overflow:hidden}
.cal-dcell.sun{color:#ff7a7a}.cal-dcell.sat{color:#6fa8ff}
.cal-cell{position:relative;min-width:0;min-height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:13px;color:var(--ink2);transition:background .12s,transform .12s}
.cal-cell.empty{background:transparent}
.cal-cell.has{cursor:pointer;background:var(--panel);border:1px solid var(--line)}
.cal-cell.has:hover{background:var(--panel3);transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.15)}
.cal-cell.sun .cal-num{color:#ff7a7a}.cal-cell.sat .cal-num{color:#6fa8ff}
.cal-cell.holiday{background:rgba(255,90,90,.12)}
.cal-cell.holiday .cal-num{color:#ff7a7a;font-weight:700}
.cal-cell.today{background:var(--teal);box-shadow:0 2px 10px rgba(80,200,190,.35)}
.cal-cell.today .cal-num{color:#04201d;font-weight:800}
.cal-cell.today .cal-dot{box-shadow:0 0 0 1.5px rgba(255,255,255,.7)}
.cal-num{font-size:13px;font-weight:600}
.cal-dots{display:flex;gap:2px;margin-top:2px;max-width:100%;flex-wrap:wrap;justify-content:center}
.cal-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.cal-dot.holiday{background:#ff5b5b}.cal-dot.expiry{background:#e7ad48}
.cal-dot.dividend{background:#7fe6b0}.cal-dot.custom{background:#6fa8ff}
.cal-dot.econ{background:#c98bff}.cal-dot.disclosure{background:#f0a868}.cal-dot.filing{background:#5b9dff}.cal-dot.global{background:#4db8e8}.cal-dot.market{background:#e7ad48}
.cal-legend{display:flex;flex-wrap:wrap;gap:9px;margin:12px 0 6px;font-size:10px;color:var(--muted)}
.cal-legend span{display:inline-flex;align-items:center;gap:4px}
.cal-list{margin-top:10px;display:flex;flex-direction:column;gap:5px;max-height:170px;overflow-y:auto}
.cal-ev{display:flex;gap:9px;align-items:center;padding:8px 11px;border-radius:9px;background:var(--panel);border-left:3px solid var(--line2);transition:transform .12s,background .12s}
.cal-ev:hover{transform:translateX(2px)}
.cal-ev.holiday{border-left-color:#ff5b5b}.cal-ev.expiry{border-left-color:#e7ad48}
.cal-ev.dividend{border-left-color:#7fe6b0}.cal-ev.custom{border-left-color:#6fa8ff}
.cal-ev.econ{border-left-color:#c98bff}.cal-ev.disclosure{border-left-color:#f0a868}.cal-ev.filing{border-left-color:#5b9dff}.cal-ev.global{border-left-color:#4db8e8}.cal-ev.market{border-left-color:#e7ad48}
a.cal-ev{text-decoration:none}
a.cal-ev:hover{background:var(--panel3)}
.cal-ev-d{font-size:11px;font-weight:800;color:var(--ink);flex:none;min-width:34px}
.cal-ev-l{font-size:11.5px;color:var(--ink2);line-height:1.4}
.cal-empty{font-size:11px;color:var(--muted);text-align:center;padding:20px 0}
.cal-week{background:linear-gradient(135deg,rgba(80,200,190,.10),var(--panel2));border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:8px 0 12px}
.cal-week-h{font-size:11.5px;font-weight:800;color:var(--teal);margin-bottom:7px;letter-spacing:-.2px}
.cal-week-r{display:flex;gap:8px;align-items:center;font-size:11.5px;color:var(--ink2);margin-bottom:4px}
.cal-week-d{font-weight:800;min-width:38px;flex:none;font-size:10px;padding:2px 5px;border-radius:6px;background:var(--bg);text-align:center}
.cal-week-d.holiday{color:#ff7a7a}.cal-week-d.expiry{color:#e7ad48}.cal-week-d.econ{color:#c98bff}.cal-week-d.disclosure{color:#f0a868}.cal-week-d.dividend{color:#7fe6b0}.cal-week-d.filing{color:#5b9dff}.cal-week-d.global{color:#4db8e8}
.cal-filter{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
.cal-fchip{font-size:10.5px;padding:4px 10px;border-radius:13px;border:1px solid var(--line2);background:var(--panel);cursor:pointer;color:var(--ink2);transition:all .12s}
.cal-fchip:hover{border-color:var(--teal)}
.cal-fchip.off{opacity:.35;text-decoration:line-through}
.cal-fchip.holiday{border-left:3px solid #ff5b5b}.cal-fchip.expiry{border-left:3px solid #e7ad48}
.cal-fchip.dividend{border-left:3px solid #7fe6b0}.cal-fchip.econ{border-left:3px solid #c98bff}
.cal-fchip.disclosure{border-left:3px solid #f0a868}.cal-fchip.custom{border-left:3px solid #6fa8ff}.cal-fchip.filing{border-left:3px solid #5b9dff}.cal-fchip.global{border-left:3px solid #4db8e8}
.cal-tools{display:flex;gap:7px;margin:10px 0}
.cal-tool{font-size:11px;padding:6px 12px;border-radius:8px;border:1px solid var(--line2);background:var(--panel);color:var(--ink2);cursor:pointer;text-decoration:none;transition:all .12s}
.cal-tool:hover{border-color:var(--teal);color:var(--teal)}
.caadm-form{display:flex;flex-wrap:wrap;gap:6px;padding:14px 18px}
.caadm-form .adm-input{flex:1;min-width:110px}
.caadm-list{padding:0 18px 16px;max-height:300px;overflow-y:auto}
.caadm-row{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line);font-size:12px}
.caadm-d{font-family:var(--mono);color:var(--ink2);flex:none}
.caadm-t{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--panel3);color:var(--muted);flex:none}
.caadm-l{flex:1;color:var(--ink2)}
.caadm-del{font-size:10px;color:#ff7a7a;background:none;border:1px solid rgba(255,90,90,.3);border-radius:5px;padding:2px 7px;cursor:pointer;flex:none}
.themeseg .thm{flex:1;background:var(--panel);border:1px solid var(--line2);color:var(--muted);
border-radius:8px;padding:7px 0;font-size:12px;font-weight:600;cursor:pointer}
.themeseg .thm:hover{color:var(--ink)}
.themeseg .thm.on{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:700}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);
font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
#root{height:100vh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px}
::-webkit-scrollbar-track{background:transparent}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
/* ---------- top bar ---------- */
.top{display:flex;align-items:center;gap:18px;padding:14px 22px;
background:linear-gradient(180deg,#161d27,#121821);border-bottom:1px solid var(--line);flex:none}
.brand{font-size:18px;font-weight:600;letter-spacing:-.01em}
.brand b{color:var(--teal)}
.brand small{display:block;font-size:11px;color:var(--dim);font-weight:400;letter-spacing:.02em;margin-top:1px}
.themebtn{flex:none;background:var(--panel2);border:1px solid var(--line2);color:var(--ink2);
border-radius:18px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;margin-left:14px;white-space:nowrap}
.themebtn:hover{border-color:var(--teal);color:var(--ink)}
.adslot{display:flex;align-items:center;justify-content:center;min-width:260px;max-width:640px;
min-height:64px;margin:0 18px;padding:6px 16px;border:1px solid var(--line2);border-radius:12px;
background:linear-gradient(135deg,#141d2e,#0f1622);overflow:hidden;flex:1.4}
.adslot a{color:var(--ink2);font-size:13px;text-decoration:none;display:flex;align-items:center;gap:8px}
.adslot a:hover{color:#fff}
.adslot span{color:var(--ink2);font-size:13px}
.adslot img{max-height:60px;max-width:100%;display:block;border-radius:8px}
.ad-adsense{width:100%;position:relative}
.ad-label{position:absolute;top:-8px;left:0;font-size:8px;color:var(--muted);background:var(--bg);padding:0 3px;z-index:1}
.ad-empty{display:flex;align-items:center;justify-content:center;width:100%}
.ad-empty-txt{font-size:26px;font-weight:800;color:var(--dim);letter-spacing:6px;opacity:.45}
.ad-sponsor{display:flex;align-items:center;gap:12px;justify-content:center;width:100%}

/* 좁은 랭킹 */
.rcompact{display:flex;align-items:flex-start;gap:10px;padding:11px 9px;border-radius:9px;cursor:pointer;
border:1px solid var(--line);margin-bottom:6px;background:var(--panel2);transition:transform .1s,border-color .12s,box-shadow .12s}
.rcompact:hover{border-color:var(--teal);box-shadow:0 2px 10px rgba(0,0,0,.18);transform:translateY(-1px)}
body.light .rcompact:hover{box-shadow:0 2px 10px rgba(80,100,130,.15)}
.rcompact[data-sel="1"]{border-color:var(--teal);background:var(--panel3)}
.rcompact .rk{font-family:var(--mono);font-size:14px;font-weight:800;color:#fff;background:var(--teal-d);
width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:7px;flex:none}
.rcompact:nth-child(1) .rk,.rcompact:nth-child(2) .rk,.rcompact:nth-child(3) .rk{background:linear-gradient(135deg,var(--teal),var(--teal-d))}
body.light .rcompact .rk{color:#fff;background:var(--teal)}
.rcompact .rmid{flex:1;min-width:0}
.rtop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.rcompact .rnm{min-width:0}
.rcompact .rnm b{font-size:13.5px;color:var(--ink);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:inline-block;vertical-align:middle}
.rcompact .rnm .code{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:5px}
.rright{flex:none;text-align:right}
.rcompact .chg{font-size:13px;font-weight:700;display:block}
.rcompact .rprice{font-family:var(--mono);font-size:10px;color:var(--muted);display:block;margin-top:1px}
/* 수급 라인 */
.rsupply{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;align-items:center}
.rmet{font-size:10.5px;color:var(--ink);font-family:var(--mono);white-space:nowrap}
.rmet i{font-style:normal;color:var(--dim);font-family:var(--sans);margin-right:3px;font-size:9px}
.rmet.net{font-weight:700;border-radius:5px;padding:1px 6px}
.rmet.net.buy{color:#ff7a7a;background:rgba(255,90,90,.10)}
.rmet.net.sell{color:#6fa8ff;background:rgba(60,130,255,.10)}
.rmet.net.none{color:var(--dim);background:var(--panel)}
.rmet.net i{color:inherit;opacity:.75}
.rstreak{font-size:9px;font-weight:700;color:#ffb84d;background:rgba(255,150,60,.12);border-radius:4px;padding:1px 5px}
.rintens{font-size:9px;font-weight:700;color:#7fe6d8;background:rgba(45,212,191,.12);border-radius:4px;padding:1px 5px}
/* 거래대금·거래량 강조 라인 */
.rvol{display:flex;flex-direction:column;gap:4px;margin-top:7px}
.buildver{font-size:9px;color:var(--dim);font-family:var(--mono);margin-left:8px;opacity:.55;align-self:center}
.rv{display:flex;flex-direction:row;align-items:center;justify-content:space-between;gap:8px;border-radius:7px;padding:5px 10px}
.rv-lab{font-size:11px;font-weight:600;flex:none}
.rv-num{font-family:var(--mono);font-weight:800;white-space:nowrap;text-align:right}
.rv-amt{background:linear-gradient(135deg,rgba(255,180,70,.20),rgba(255,140,50,.07));border:1px solid rgba(255,180,70,.5)}
.rv-amt .rv-lab{color:#e0a850}
.rv-amt .rv-num{color:#ffd479;font-size:14px}
.rv-qty{background:rgba(45,212,191,.10);border:1px solid rgba(45,212,191,.4)}
.rv-qty .rv-lab{color:#5fb3a8}
.rv-qty .rv-num{color:#7fe6d8;font-size:13px}
/* 시장 필터 + 배지 */
.mktfilter{display:flex;gap:4px;margin:0 0 4px}
.condbar{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin:0 0 6px}
.freshnote{font-size:10px;color:var(--muted);margin:2px 0 6px;padding:3px 8px;background:var(--panel2);border-radius:6px;display:inline-block}
.rstar{background:none;border:none;cursor:pointer;font-size:15px;color:var(--dim);padding:0 2px;line-height:1}
.rstar:hover{color:var(--amber)}
.rstar.on{color:var(--amber)}
.sd-box{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sd-title{font-size:10.5px;color:var(--muted);font-weight:700;margin:6px 0 4px}
.sd-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.sd-lab{font-size:11px;color:var(--ink2);width:56px;flex:none}
.sd-bar{flex:1;height:7px;background:var(--panel3);border-radius:4px;overflow:hidden;position:relative}
.sd-bar i{display:block;height:100%}
.sd-bar i.pos{background:#ff6b6b}.sd-bar i.neg{background:#6fa8ff}
.sd-v{font-size:10.5px;width:50px;text-align:right;flex:none;font-family:var(--mono)}
.sd-v.pos{color:#ff7a7a}.sd-v.neg{color:#6fa8ff}
body.light .sd-v.pos{color:#cc3e36}body.light .sd-v.neg{color:#2f6fd0}
body.light .sd-bar i.pos{background:#cc3e36}body.light .sd-bar i.neg{background:#2f6fd0}
.sd-note{font-size:10.5px;color:var(--muted);margin-top:6px;line-height:1.5}
.sd-src{font-size:9px;font-weight:700;color:var(--teal);background:rgba(20,150,130,.14);border-radius:4px;padding:1px 5px;margin-left:4px}
.rtsup{background:linear-gradient(160deg,rgba(40,55,80,.5),rgba(20,28,42,.5));border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:14px}
.rtsup-h{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rt-live{font-size:9.5px;color:#5fd39a;display:inline-flex;align-items:center;gap:3px;font-weight:600}
.rt-off{font-size:9.5px;color:var(--muted);font-weight:600}
.rt-demo{font-size:9px;background:rgba(231,173,72,.18);color:var(--amber);border-radius:4px;padding:1px 5px;font-weight:700}
.rtsup-bar{height:8px;border-radius:5px;position:relative;background:linear-gradient(90deg,#4a90e2 0%,#6fa8ff 30%,#ffd479 50%,#ff9a6b 70%,#ff5b5b 100%)}
.rtsup-mk{position:absolute;top:-3px;width:4px;height:14px;background:#fff;border:2px solid #fff;border-radius:3px;transform:translateX(-50%);box-shadow:0 0 5px rgba(0,0,0,.5)}
.rtsup-sc{display:flex;justify-content:space-between;font-size:9.5px;color:var(--muted);margin-top:5px}
.rtsup-bits{font-size:10.5px;color:var(--ink2);margin-top:8px;text-align:center}
.rtsup-bits b{color:var(--teal)}
.rtsup-note{font-size:9.5px;color:var(--muted);margin-top:6px;line-height:1.4;text-align:center}
.creport{background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px;margin-left:6px;opacity:0;transition:opacity .15s;vertical-align:middle}
.crow:hover .creport{opacity:.6}
.creport:hover{opacity:1;color:#ff7a7a}
.bd-report{margin-left:auto;opacity:.4}
.appfooter{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding:10px 18px;border-top:1px solid var(--line);background:var(--bg);font-size:11px;color:var(--muted)}
.appfooter .ft-links a{color:var(--muted);cursor:pointer;margin:0 4px;text-decoration:none}
.appfooter .ft-links a:hover{color:var(--teal);text-decoration:underline}
.appfooter .ft-admin{margin-left:10px;opacity:.5}
.appfooter .ft-admin:hover{opacity:1}
.legalmodal{max-width:680px;width:92%;max-height:80vh;display:flex;flex-direction:column}
.legaltext{white-space:pre-wrap;font-family:var(--sans);font-size:12.5px;line-height:1.7;color:var(--ink2);overflow-y:auto;padding:16px 20px;margin:0}
.adminmodal{max-width:560px;width:92%;max-height:80vh;overflow-y:auto}
.adm-login{padding:24px;display:flex;flex-direction:column;gap:10px}
.adm-lbl{font-size:13px;color:var(--ink)}
.adm-input{background:var(--panel);border:1px solid var(--line2);border-radius:7px;padding:9px 12px;color:var(--ink);font-size:13px}
.adm-btn{background:var(--teal);color:#fff;border:none;border-radius:7px;padding:9px;font-size:13px;cursor:pointer;font-weight:600}
.adm-hint{font-size:10.5px;color:var(--muted)}
.adm-reps{padding:14px 18px}
.adm-sec{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:10px}
.adm-rep{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.adm-rep-h{font-size:11px;color:var(--amber);font-weight:600;margin-bottom:4px}
.adm-rep-c{font-size:12px;color:var(--ink2);margin-bottom:8px;word-break:break-all}
.adm-rep-act{display:flex;gap:6px}
.adm-sbtn{background:var(--panel3);border:1px solid var(--line2);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer}
.adm-sbtn.hide{color:#ff7a7a;border-color:rgba(255,90,90,.3)}
.adm-sbtn.ok{color:#5fd39a;border-color:rgba(80,200,140,.3)}
.adm-sbtn:hover{color:var(--ink)}
.pd-summary{font-size:12px;color:var(--ink2);margin:6px 0}
.pd-list{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.pd-row{display:flex;gap:8px;align-items:center;font-size:11px;padding:4px 0;border-bottom:1px solid var(--line)}
.pd-name{flex:none;min-width:110px;color:var(--ink2);font-weight:600}
.pd-ok{color:#5fd39a;font-size:10.5px}
.pd-bad{color:#ff7a7a;font-size:10.5px}
.pd-err{color:var(--muted);font-size:9.5px}
.pd-advice{font-size:11px;color:var(--muted);padding:4px 0 8px;line-height:1.5}
.pd-advice.ok{color:var(--teal)}
.pd-big-ok{background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.3);border-radius:9px;padding:11px 13px;font-size:13px;color:var(--teal);font-weight:600;margin:6px 0 10px;line-height:1.5}
.pd-big-bad{background:rgba(231,173,72,.1);border:1px solid rgba(231,173,72,.3);border-radius:9px;padding:11px 13px;font-size:12.5px;color:#e7ad48;margin:6px 0 10px;line-height:1.6}
.adm-tokchk{margin-top:10px;padding:10px 12px;background:var(--panel3);border:1px solid var(--line2);border-radius:8px;font-size:12px;color:var(--ink2);line-height:1.5}
.adm-empty,.adm-load{padding:24px;text-align:center;color:var(--muted);font-size:12px}
.adm-banned{padding:14px 18px;border-top:1px solid var(--line)}
.adm-stats{padding:14px 18px;border-top:1px solid var(--line)}
.adm-refresh{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-left:6px}
.adm-refresh:hover{color:var(--teal)}
.adm-stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0 12px}
.adm-card{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 6px;text-align:center}
.adm-card-n{font-size:18px;font-weight:800;color:var(--ink)}
.adm-card-l{font-size:9.5px;color:var(--muted);margin-top:2px}
.adm-stat-lbl{font-size:10.5px;color:var(--ink2);font-weight:600;margin:10px 0 4px}
.adm-bars{display:flex;align-items:flex-end;gap:4px;height:72px;padding:4px 0}
.adm-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px}
.adm-bar{width:100%;max-width:24px;border-radius:3px 3px 0 0;min-height:4px}
.adm-bar-v{font-size:9px;color:var(--ink2)}
.adm-bar-d{font-size:8px;color:var(--muted)}
.adm-note{font-size:9.5px;color:var(--muted);margin-top:8px;line-height:1.4}
.glossmodal{max-width:640px;width:94%;max-height:84vh;display:flex;flex-direction:column}
.gloss-cnt{font-size:10.5px;color:var(--muted);margin-left:10px;font-weight:500}
.gloss-search{display:flex;align-items:center;gap:8px;margin:12px 16px 8px;padding:9px 12px;background:var(--panel);border:1px solid var(--line2);border-radius:9px}
.gloss-search .ico{color:var(--muted);font-size:14px}
.gloss-search input{flex:1;background:none;border:none;color:var(--ink);font-size:13px;outline:none}
.gloss-cats{display:flex;flex-wrap:wrap;gap:5px;padding:0 16px 8px}
.gloss-cat{font-size:11px;padding:4px 11px;border-radius:13px;border:1px solid var(--line2);background:var(--panel);color:var(--ink2);cursor:pointer;transition:all .12s}
.gloss-cat:hover{border-color:var(--teal)}
.gloss-cat.on{background:var(--teal);border-color:var(--teal);color:#04201d;font-weight:700}
.gloss-list{overflow-y:auto;padding:4px 16px 8px;flex:1}
.gloss-item{padding:12px 0;border-bottom:1px solid var(--line)}
.gloss-term{font-size:14px;font-weight:800;color:var(--ink);display:flex;align-items:baseline;flex-wrap:wrap;gap:8px}
.gloss-full{font-size:11px;font-weight:500;color:var(--muted)}
.gloss-tag{font-size:9px;padding:1px 6px;border-radius:5px;background:var(--panel3);color:var(--muted);margin-left:auto;flex:none}
.gloss-desc{font-size:12.5px;color:var(--ink2);line-height:1.65;margin-top:6px}
.dg-item{padding:13px 0;border-bottom:1px solid var(--line)}
.dg-type{display:inline-block;font-size:13px;font-weight:800;color:var(--ink);padding:3px 10px;border-radius:7px;background:var(--panel2);border-left:3px solid var(--teal);margin-bottom:8px}
.dg-type.dividend{border-left-color:#7fe6b0}.dg-type.rights{border-left-color:#e7ad48}
.dg-type.earnings{border-left-color:#4fb3a8}.dg-type.ma{border-left-color:#c98bff}
.dg-type.ipo{border-left-color:#f0a868}.dg-type.buyback{border-left-color:#6fa8ff}
.dg-row{display:flex;gap:8px;margin-bottom:4px;font-size:12px;line-height:1.55}
.dg-k{flex:none;width:52px;color:var(--muted);font-weight:700;font-size:10.5px;padding-top:1px}
.dg-v{flex:1;color:var(--ink2)}
.dg-v.warn{color:#e7956b}
@media (max-width:760px){ .gloss-tag{margin-left:0} }
.sg-item{padding:13px 0;border-bottom:1px solid var(--line)}
.sg-step,.sg-q{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:5px}
.sg-q{color:var(--teal)}
.sg-a{font-size:12.5px;color:var(--ink2);line-height:1.65}
@media (max-width:760px){ .adm-stat-cards{grid-template-columns:repeat(2,1fr)} }
.adm-banarea{width:100%;min-height:80px;background:var(--panel);border:1px solid var(--line2);border-radius:7px;padding:9px 12px;color:var(--ink);font-size:12px;font-family:var(--mono);resize:vertical;margin-bottom:8px}
.adm-btn.sm{padding:6px 14px;font-size:12px}
body.light .rtsup{background:linear-gradient(160deg,#eef2f8,#f6f8fc)}
.freshnote.stale{color:var(--amber);background:rgba(231,173,72,.1)}
body.light .freshnote.stale{color:#9a6708}
.cond-lab{font-size:10px;color:var(--muted);margin-right:2px}
.condchip{background:var(--panel);border:1px solid var(--line2);color:var(--muted);border-radius:13px;
padding:4px 10px;font-size:11px;cursor:pointer;white-space:nowrap;font-weight:500}
.condchip:hover{color:var(--ink);border-color:var(--line3)}
.condchip.on{background:var(--amber);border-color:var(--amber);color:#1a1206;font-weight:700}
body.light .condchip.on{background:#bd8019;color:#fff}
.mktfilter button{flex:1;background:var(--panel);border:1px solid var(--line2);border-radius:7px;
padding:5px 0;font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--sans);transition:.12s}
.mktfilter button:hover{color:var(--ink);border-color:var(--line3)}
.mktfilter button[data-on="1"]{background:#23304a;border-color:var(--blue);color:#fff;font-weight:700}
.mkbadge{font-size:8.5px;font-weight:700;border-radius:4px;padding:1px 4px;margin-right:5px;vertical-align:middle}
.mkbadge.kospi{color:#ff9a6b;background:rgba(255,120,60,.14)}
.mkbadge.kosdaq{color:#6fb6ff;background:rgba(70,140,255,.14)}
.mkbadge.etf{color:#7fe6b0;background:rgba(60,200,140,.14)}
.chatroom-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:11px;color:var(--teal);background:rgba(20,150,130,.08);border-bottom:1px solid var(--line)}
.chatroom-bar b{color:var(--ink)}
.chatroom-exit{margin-left:auto;background:var(--panel);border:1px solid var(--line2);color:var(--muted);border-radius:6px;padding:2px 8px;font-size:10px;cursor:pointer}
.chatroom-exit:hover{color:var(--ink);border-color:var(--teal)}
.d-chatbtn{background:rgba(20,150,130,.12);border:1px solid var(--teal-d);color:var(--teal);border-radius:7px;padding:4px 10px;font-size:11px;cursor:pointer;margin-left:8px}
.d-chatbtn:hover{background:var(--teal);color:#fff}
body.light .d-chatbtn{color:#0c7e6d}
body.light .mkbadge.etf{color:#1d934a;background:rgba(30,150,80,.12)}
/* 플로팅 창(드래그·리사이즈) */
.floatwin{position:fixed;z-index:60;background:linear-gradient(160deg,#141c2b,#0f1622);
border:1px solid #2a3a55;border-radius:12px;box-shadow:0 24px 70px rgba(0,0,0,.6);
display:flex;flex-direction:column;min-width:360px;min-height:280px;overflow:hidden}
.fw-bar{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:move;user-select:none;
background:linear-gradient(135deg,#1b2740,#131c2b);border-bottom:1px solid #243349;flex:none}
.fw-title{font-size:15px;font-weight:800;color:#fff;display:flex;align-items:baseline;gap:8px;white-space:nowrap}
.fw-sub{font-size:10.5px;color:var(--dim);font-weight:400}
.fw-x{margin-left:8px;background:transparent;border:0;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 7px;border-radius:6px}
.fw-x:hover{background:rgba(255,255,255,.08);color:#fff}
.fw-body{flex:1;overflow-y:auto;padding:16px 18px;min-height:0}
.fw-resize{position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;
background:linear-gradient(135deg,transparent 50%,#3a4a66 50%,#3a4a66 60%,transparent 60%,transparent 72%,#3a4a66 72%,#3a4a66 82%,transparent 82%)}
.mflow-tabs{display:flex;gap:5px;margin-left:auto}
.mflow-tabs button{background:var(--panel);border:1px solid var(--line2);border-radius:7px;padding:4px 11px;
font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--sans)}
.mflow-tabs button[data-on="1"]{background:#23304a;border-color:var(--blue);color:#fff;font-weight:700}
.osc-gauge{font-size:13px;color:var(--ink);margin-bottom:8px}
.osc-gauge b{font-family:var(--mono);font-size:18px}
.osc-state{font-size:11px;font-weight:700;margin-left:4px}
.mflow-legend{display:flex;gap:14px;font-size:10.5px;color:var(--muted);margin-bottom:6px}
.mflow-legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
.mflow-svg{width:100%;background:#0c1320;border:1px solid var(--line2);border-radius:8px;margin-bottom:6px;display:block}
/* 종목별 오실레이터 탭 */
.osc-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.ob{flex:1;min-width:110px;background:var(--panel);border:1px solid var(--line2);border-radius:9px;padding:8px 11px}
.ob-l{display:block;font-size:10px;color:var(--muted);margin-bottom:3px}
.ob-v{font-family:var(--mono);font-size:19px;font-weight:800;color:var(--ink)}
.ob-v.na{color:var(--dim)}
.ob-s{font-size:10px;font-weight:700;margin-left:6px}
.ob.over{border-color:rgba(255,90,90,.5)} .ob.over .ob-v,.ob.over .ob-s{color:#ff6b6b}
.ob.under{border-color:rgba(70,140,255,.5)} .ob.under .ob-v,.ob.under .ob-s{color:#6fa8ff}
.ob.mid .ob-s{color:#ffd479}
.osc-sec-h{font-size:11.5px;font-weight:600;color:var(--muted);margin:10px 0 5px}
.osc-verdict{background:linear-gradient(135deg,#161f30,#0f1622);border:1px solid var(--line2);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.ov-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.ov-label{font-size:20px;font-weight:800}
.ov-num{font-size:12px;color:var(--muted)} .ov-num b{font-size:18px;color:var(--ink);font-family:var(--mono)} .ov-num small{font-size:10px;color:var(--dim)}
.ov-bar{position:relative;height:12px;border-radius:7px;margin:6px 0 4px;
background:linear-gradient(90deg,#4a90e2 0%,#6fa8ff 25%,#ffd479 50%,#ff9a6b 75%,#ff6b6b 100%)}
.ov-marker{position:absolute;top:-4px;width:6px;height:20px;background:#fff;border:3px solid #fff;border-radius:4px;transform:translateX(-50%);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.ov-scale{display:flex;justify-content:space-between;font-size:9.5px;color:var(--dim)}
.ov-desc{font-size:12.5px;color:var(--ink2);margin-top:8px;line-height:1.5}
.osc-explain{font-size:11px;color:var(--muted);background:var(--panel);border-radius:7px;padding:6px 10px;margin:10px 0 5px;line-height:1.5}
.osc-explain b{color:var(--ink)}
.ma-align{font-size:10px;font-weight:700;border-radius:5px;padding:1px 7px;margin-left:6px}
.ma-align.up{color:#ff7a7a;background:rgba(255,90,90,.14)}
.ma-align.down{color:#6fa8ff;background:rgba(60,130,255,.14)}
.ma-align.neu{color:var(--muted);background:var(--panel)}
.ma-legend{display:flex;gap:12px;font-size:9.5px;margin:2px 0 4px}
.ma-legend .c1{color:#5ad1c4}.ma-legend .c2{color:#ffd479}.ma-legend .c3{color:#ff9a5a}.ma-legend .c4{color:#9b8cff}
.ma-legend .cb{color:#7d8fc8}
.bb-pos{font-size:10px;font-weight:700;color:#7d8fc8;background:rgba(120,140,200,.14);border-radius:5px;padding:1px 7px;margin-left:6px}
body.light .bb-pos{color:#4a5a8a}
.osc-divg{font-size:12px;border-radius:8px;padding:9px 12px;margin-bottom:12px;line-height:1.5}
.osc-divg.bear{color:#ff8a8a;background:rgba(255,90,90,.12);border:1px solid rgba(255,90,90,.3)}
.osc-divg.bull{color:#6fb6ff;background:rgba(70,140,255,.12);border:1px solid rgba(70,140,255,.3)}
body.light .osc-divg.bear{color:#cc3e36}body.light .osc-divg.bull{color:#2f6fd0}
.osc-divg b{color:inherit}
.osc-signals{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.osig{font-size:11px;font-weight:700;border-radius:6px;padding:4px 10px}
.osig.buy{color:#6fb6ff;background:rgba(70,140,255,.14)}
.osig.warn{color:#ff8a8a;background:rgba(255,90,90,.14)}
.osig.neu{color:var(--muted);background:var(--panel);font-weight:500}
/* 게시판 */
.board-modal{max-width:600px}
.bd-new{background:linear-gradient(135deg,var(--teal),var(--teal-d));border:0;color:#06201d;
border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:14px}
.bd-new:hover{filter:brightness(1.1)}
.bd-form{background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:12px;margin-bottom:16px}
.bd-frow{display:flex;gap:8px;margin-bottom:8px}
.bd-sel,.bd-inp,.bd-area{background:var(--bg);border:1px solid var(--line2);color:var(--ink);
border-radius:7px;padding:8px 10px;font-size:13px;font-family:var(--sans)}
.bd-sel{flex:none} .bd-inp{flex:1;min-width:0} .bd-inp.full{width:100%;margin-bottom:8px;box-sizing:border-box}
.bd-area{width:100%;min-height:90px;resize:vertical;box-sizing:border-box;margin-bottom:8px;line-height:1.5}
.bd-inp:focus,.bd-area:focus,.bd-sel:focus{outline:none;border-color:var(--teal)}
.bd-actions{display:flex;justify-content:flex-end;gap:8px}
.bd-cancel{background:var(--panel2);border:1px solid var(--line2);color:var(--muted);border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer}
.bd-submit{background:linear-gradient(135deg,var(--teal),var(--teal-d));border:0;color:#06201d;border-radius:7px;padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer}
.bd-list{display:flex;flex-direction:column;gap:10px}
.bd-post{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:11px 13px}
.bd-phead{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bd-cat{font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;flex:none}
.bd-cat.bug{color:#ff8a8a;background:rgba(255,90,90,.12)} .bd-cat.idea{color:#ffd479;background:rgba(255,180,70,.12)}
.bd-title{font-size:13.5px;font-weight:600;color:var(--ink);flex:1;min-width:0}
.bd-st{font-size:9.5px;font-weight:700;border-radius:4px;padding:2px 7px;flex:none}
.bd-st.open{color:#6fb6ff;background:rgba(70,140,255,.12)} .bd-st.done{color:#5ad1c4;background:rgba(45,212,191,.12)}
.bd-body{font-size:12.5px;color:var(--ink2);line-height:1.55;margin-bottom:6px}
.bd-meta{font-size:10.5px;color:var(--dim)}
/* 상세 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:flex;
align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal{background:var(--bg);border:1px solid var(--line2);border-radius:12px;width:min(640px,100%);
box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-x{position:absolute;top:0;right:0;margin:14px;background:var(--panel3);border:1px solid var(--line2);
color:var(--ink2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px}
.modal-inner{padding:20px}
.msg{padding:9px 22px;background:var(--amber-d);color:#f3d8a0;font-size:13px;border-bottom:1px solid var(--line);flex:none}
.label{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);
font-weight:600;margin:0 0 9px}
.label.mt{margin-top:22px}
/* ---------- horizon tabs ---------- */
.htab{display:flex;flex-direction:column;gap:7px}
.htab button{display:flex;align-items:center;justify-content:space-between;
background:var(--panel);border:1px solid var(--line);border-radius:9px;
padding:13px 15px;cursor:pointer;color:var(--ink2);text-align:left;transition:.12s}
.htab button:hover{border-color:var(--line2);background:var(--panel2)}
.htab button[data-on="1"]{background:linear-gradient(135deg,#16302c,#173b34);
border-color:var(--teal);color:#fff}
.htab .h-ko{font-size:16px;font-weight:600}
.htab .h-desc{font-size:11px;color:var(--muted);margin-top:2px;display:block}
.htab button[data-on="1"] .h-desc{color:#9fded0}
.htab .h-en{font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.05em}
/* ---------- stats ---------- */
.stat{display:flex;justify-content:space-between;align-items:baseline;
padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.stat:last-child{border-bottom:0}
.stat .k{color:var(--muted)}
.stat .v{color:var(--ink);font-family:var(--mono);font-weight:500}
.note{font-size:12px;color:var(--muted);line-height:1.65;background:var(--panel);
border:1px solid var(--line);border-left:3px solid var(--blue-d);border-radius:7px;padding:11px 13px;margin-top:14px}
.note b{color:var(--ink2)}
/* calibration */
.calib{display:flex;flex-direction:column;gap:5px}
.cbin{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;
background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:7px 11px;font-size:12.5px}
.cbin .rng{color:var(--ink2);font-family:var(--mono)}
.cbin .hr{font-family:var(--mono);font-weight:600;color:var(--teal)}
.cbin .n{color:var(--dim);font-size:11px}
/* ---------- search ---------- */
.search{position:relative;margin-bottom:14px}
.search input{width:100%;background:var(--panel);border:1px solid var(--line2);border-radius:8px;
padding:11px 13px 11px 36px;color:var(--ink);font-size:14px;font-family:var(--sans)}
.search input:focus{outline:none;border-color:var(--blue)}
.search input::placeholder{color:var(--dim)}
.search .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:15px}
/* ---------- ranking ---------- */
.rank-head{display:grid;grid-template-columns:34px 1fr 96px 120px;gap:12px;
padding:0 12px 10px;font-size:11px;letter-spacing:.06em;color:var(--dim);
text-transform:uppercase;font-weight:600;border-bottom:1px solid var(--line);position:sticky;top:-18px;background:var(--bg);z-index:2}
.rank-head span:nth-child(3),.rank-head span:nth-child(4){text-align:right}
.row{display:grid;grid-template-columns:34px 1fr 96px 120px;gap:12px;align-items:center;
padding:13px 12px;border-bottom:1px solid var(--line);cursor:pointer;transition:.1s}
.row:hover{background:var(--panel)}
.row[data-sel="1"]{background:linear-gradient(90deg,#16302c22,var(--panel2));
box-shadow:inset 3px 0 0 var(--teal)}
.row .rk{font-family:var(--mono);font-size:14px;color:var(--dim);text-align:right;font-weight:500}
.row[data-sel="1"] .rk{color:var(--teal)}
.nm b{font-size:15px;font-weight:600;color:var(--ink);display:block;line-height:1.3}
.nm .code{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
.nm .flags{display:inline-flex;gap:4px;margin-left:7px;flex-wrap:wrap}
.flag{background:var(--red-d);color:#f3a59f;border-radius:4px;padding:1px 6px;font-size:10.5px;font-weight:500}
.score-cell{text-align:right}
.score-cell .v{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--ink)}
.score-cell .bar{height:4px;background:var(--line);border-radius:2px;margin-top:5px;overflow:hidden}
.score-cell .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--teal-d),var(--teal))}
.conf-cell{text-align:right}
.conf-cell .v{font-family:var(--mono);font-size:14px;color:var(--ink2);font-weight:500}
.gauge{display:flex;gap:3px;margin-top:6px;justify-content:flex-end}
.gauge i{width:30px;height:5px;border-radius:2px;background:var(--line);overflow:hidden;position:relative}
.gauge i b{position:absolute;left:0;top:0;height:100%;display:block}
.g-cov b{background:var(--teal)} .g-agr b{background:var(--blue)} .g-frs b{background:var(--amber)}
.load{padding:40px 12px;text-align:center;color:var(--dim);font-size:13px}
/* ---------- detail ---------- */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
height:100%;gap:12px;color:var(--dim);text-align:center;padding:30px}
.empty .big{font-size:42px;opacity:.35}
.empty .t{font-size:14px;color:var(--muted)}
.empty .s{font-size:12px}
.d-head{border-bottom:1px solid var(--line);padding-bottom:15px;margin-bottom:16px}
.d-title{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.d-title .nm{font-size:21px;font-weight:600}
.d-title .code{font-family:var(--mono);font-size:13px;color:var(--muted)}
.d-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:14px}
.metric{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:11px 13px}
.metric .k{font-size:10px;letter-spacing:.07em;color:var(--dim);text-transform:uppercase;font-weight:600}
.metric .val{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:3px}
.metric .val.teal{color:var(--teal)} .metric .val.blue{color:var(--blue)}
/* tabs in detail */
.dtabs{display:flex;gap:4px;margin-bottom:16px;background:var(--panel);border:1px solid var(--line);
border-radius:9px;padding:4px}
.dtabs button{flex:1;background:transparent;border:0;color:var(--muted);font-family:var(--sans);
font-size:13.5px;font-weight:500;padding:9px;border-radius:6px;cursor:pointer}
.dtabs button[data-on="1"]{background:var(--panel3);color:var(--ink)}
.sec{margin-bottom:18px}
.sec-t{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);
font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-t .cnt{background:var(--panel3);color:var(--ink2);border-radius:10px;padding:1px 8px;font-size:11px;text-transform:none;letter-spacing:0}
/* signal cards */
.sig{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-bottom:7px}
.sig.fired{border-left:3px solid var(--teal)}
.sig.abst{border-left:3px solid var(--dim);opacity:.78}
.sig-h{display:flex;align-items:center;justify-content:space-between;gap:10px}
.sig-h .nm{font-size:14px;font-weight:500;color:var(--ink)}
.sig-h .val{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--teal)}
.sig-h .reason{font-family:var(--mono);font-size:11.5px;color:var(--dim)}
.sig-ev{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.ev{background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:3px 8px;
font-size:11.5px;color:var(--muted);font-family:var(--mono)}
.ev b{color:var(--ink2);margin-left:5px}
/* verification panel */
.verify-intro{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--blue);
border-radius:8px;padding:12px 14px;font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:16px}
.verify-intro b{color:var(--ink)}
.calc{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:13px;margin-bottom:7px}
.calc.fired{border-left:3px solid var(--teal)}
.calc.abst{border-left:3px solid var(--dim)}
.calc-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.calc-nm{font-size:13.5px;font-weight:500;color:var(--ink)}
.badge{font-size:10px;font-weight:600;letter-spacing:.04em;padding:2px 7px;border-radius:4px}
.badge.f{background:var(--teal-d);color:#9fded0} .badge.a{background:var(--panel3);color:var(--muted)}
.calc-formula{font-family:var(--mono);font-size:12.5px;color:var(--ink2);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.calc-formula .op{color:var(--dim)} .calc-formula .res{color:var(--teal);font-weight:600;margin-left:auto}
.contrib-bar{height:6px;background:var(--line);border-radius:3px;margin-top:9px;overflow:hidden}
.contrib-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--teal-d),var(--teal))}
.calc-miss{font-family:var(--mono);font-size:11.5px;color:var(--amber);margin-top:6px}
.reconstruct{background:linear-gradient(135deg,#141d27,#16222e);border:1px solid var(--line2);
border-radius:9px;padding:15px;margin-top:14px}
.reconstruct .r-row{display:flex;justify-content:space-between;align-items:baseline;
padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.reconstruct .r-row:last-child{border-bottom:0}
.reconstruct .r-k{color:var(--muted)}
.reconstruct .r-v{font-family:var(--mono);color:var(--ink);font-weight:500}
.reconstruct .r-v.big{font-size:18px;color:var(--teal);font-weight:600}
.reconstruct .r-eq{font-family:var(--mono);font-size:11.5px;color:var(--dim);margin-top:8px;line-height:1.6}
.confbars{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.cb{display:grid;grid-template-columns:88px 1fr 46px;gap:10px;align-items:center;font-size:12.5px}
.cb .k{color:var(--muted)}
.cb .track{height:8px;background:var(--line);border-radius:4px;overflow:hidden}
.cb .track i{display:block;height:100%}
.cb .v{font-family:var(--mono);text-align:right;color:var(--ink2)}
.expl{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;
font-size:13.5px;line-height:1.7;color:var(--ink2);white-space:pre-wrap}
.livedot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);
box-shadow:0 0 7px var(--green);animation:livepulse 1.4s ease-in-out infinite;vertical-align:middle}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.25}}
/* news feed + data grid (데이터·뉴스 탭) */
.nrefresh{margin-left:auto;background:var(--panel3);border:1px solid var(--line2);color:var(--ink2);
font-family:var(--sans);font-size:11px;padding:3px 9px;border-radius:6px;cursor:pointer;text-transform:none;letter-spacing:0}
.nrefresh:hover{background:#2c3848;color:var(--ink)}
.nfresh{font-size:11.5px;color:var(--teal);margin-bottom:9px}
.nlive{font-size:11.5px;color:var(--green);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.feedlink{font-size:11px;color:var(--teal);text-decoration:none;border:1px solid var(--teal-d);
border-radius:6px;padding:2px 7px;margin-left:8px}
.ixstrip{display:flex;gap:0;background:var(--panel2);border-bottom:1px solid var(--line);
padding:7px 16px;overflow-x:auto;align-items:center;white-space:nowrap}
.ixitem{display:flex;align-items:baseline;gap:8px;padding:0 18px;border-right:1px solid var(--line);flex:none}
.ixitem:first-child{padding-left:0}
.ixname{font-size:12px;color:var(--dim);font-weight:600}
.ixval{font-family:var(--mono);font-size:14px;color:var(--ink);font-weight:600}
.ixchg{font-family:var(--mono);font-size:12px}
.ix-up{color:#f0655d}    /* 상승 = 빨강(한국식) */
.ix-down{color:#5a9cf8}  /* 하락 = 파랑 */
.ix-flat{color:var(--muted)}
.fxstrip{padding:6px 16px}
.fxlabel{font-size:11px;font-weight:700;color:var(--teal);padding-right:14px;border-right:1px solid var(--line);margin-right:4px;flex:none}
.fxattr{font-size:9.5px;color:var(--muted);margin-left:auto;padding-left:14px;flex:none}
.ce-tabs{display:flex;gap:4px;padding:10px 16px 0;flex-wrap:wrap}
.ce-tab{background:var(--panel3);border:1px solid var(--line2);color:var(--muted);border-radius:8px;padding:7px 13px;font-size:13px;cursor:pointer;font-weight:600}
.ce-tab.on{background:rgba(45,212,191,.15);border-color:var(--teal);color:var(--teal)}
.ce-body{padding:12px 16px 16px;max-height:60vh;overflow-y:auto}
.ce-list{display:flex;flex-direction:column;gap:2px}
.ce-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.ce-nm{font-size:14px;font-weight:600;color:var(--ink);flex:1;min-width:0}
.ce-sub{font-size:11.5px;color:var(--muted);flex:none;max-width:45%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ce-dt{font-family:var(--mono);font-size:11px;color:var(--teal);flex:none}
.ce-note{font-size:13px;color:var(--muted);padding:18px 4px;line-height:1.6;text-align:center}
.ce-attr{font-size:10px;color:var(--muted);margin-top:12px;line-height:1.5;padding-top:10px;border-top:1px solid var(--line)}
.ce-search{display:flex;gap:7px;margin-bottom:12px}
.ce-search-in{flex:1;background:var(--panel3);border:1px solid var(--line2);color:var(--ink);border-radius:8px;padding:9px 12px;font-size:14px}
.ce-search-in:focus{outline:none;border-color:var(--teal)}
.ce-search-btn{background:var(--teal);color:#04201c;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;flex:none}
.ce-hint{font-size:12px;color:var(--muted);padding:6px 2px}
.ce-fin{padding:11px 0;border-bottom:1px solid var(--line)}
.ce-fin .ce-nm{margin-bottom:6px}
.ce-yr{font-size:11px;color:var(--muted);font-weight:400}
.ce-fin-row{display:flex;flex-wrap:wrap;gap:8px}
.ce-fin-row span{font-size:12.5px;font-family:var(--mono);color:var(--ink2);background:var(--panel3);padding:4px 9px;border-radius:6px}
/* 투자 계산기 — 고급 플로팅 창 */
.calc-float{pointer-events:auto;position:fixed;left:50%;top:70px;transform:translateX(-50%);
  box-shadow:0 24px 64px rgba(0,0,0,.55);max-height:82vh;display:flex;flex-direction:column;
  overflow:hidden;border:1px solid var(--line2);border-radius:16px}
.calc-float.ce-min{max-height:none}
.calc-head{cursor:move;user-select:none;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,rgba(45,212,191,.14),rgba(45,212,191,.03));border-bottom:1px solid var(--line)}
.calc-tabs{padding:11px 14px 0;flex-wrap:wrap;gap:5px}
.calc-body{padding:16px 18px 8px;max-height:none;overflow-y:auto;flex:1;min-height:0}
.calc-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px}
.calc-row label{font-size:13px;color:var(--ink2);flex:none;font-weight:500}
.calc-in{flex:1;max-width:210px;background:var(--panel3);border:1px solid var(--line2);color:var(--ink);
  border-radius:9px;padding:10px 13px;font-size:15px;font-family:var(--mono);text-align:right;transition:border .12s,box-shadow .12s}
.calc-in:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(45,212,191,.13)}

// ---------- helpers ----------
function esc(s){ if(s==null) return ""; return String(s).replace(/[&<>"]/g,function(c){
return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }
function pc(x){ return Math.max(0,Math.min(100,(x*100))).toFixed(0); }
function fmtNum(v){ return typeof v==="number" ? (Number.isInteger(v)?String(v):v.toFixed(2)) : esc(v); }
function won(v){ return v==null?"—":Number(v).toLocaleString(); }
// 시각은 브라우저 로컬(한국) 기준으로 표시. 서버 ts(UTC)·기사시각(+09:00) 모두 올바르게 변환.
function tFmt(iso, mode){
if(!iso) return "";
var d=new Date(iso);
if(isNaN(d.getTime())) return String(iso).slice(0,16).replace("T"," ");
function p(n){ return (n<10?"0":"")+n; }
var hm=p(d.getHours())+":"+p(d.getMinutes());
var md=p(d.getMonth()+1)+"-"+p(d.getDate());
if(mode==="hm") return hm;
if(mode==="md_hm") return md+" "+hm;
if(mode==="md_smart"){ // 시각이 00:00이면(공시처럼 시간정보 없음) 날짜만
  return (d.getHours()===0 && d.getMinutes()===0) ? md : (md+" "+hm);
}
if(mode==="date_md"){ // 날짜만(공시 — 원본 문자열에서 직접, 타임존 변환 영향 최소화)
  var m=String(iso).match(/(\d{4})-(\d{2})-(\d{2})/);
  return m? (m[2]+"-"+m[3]) : md;
}
if(mode==="date") return d.getFullYear()+"-"+md;
return hm+":"+p(d.getSeconds());   // 기본 hms
}
function gauge(cov,agr,frs){
return '<div class="gauge" title="데이터 충분도 '+pc(cov)+' · 신호 합의 '+pc(agr)+' · 신선도 '+pc(frs)+'">'+
'<i class="g-cov"><b style="width:'+pc(cov)+'%"></b></i>'+
'<i class="g-agr"><b style="width:'+pc(agr)+'%"></b></i>'+
'<i class="g-frs"><b style="width:'+pc(frs)+'%"></b></i></div>';
}
// 장 상태 — 브라우저 로컬(한국) 시간 기준. 주말 + KRX 휴장일(서버 제공) 반영.
function ymdLocal(d){ function p(n){return (n<10?"0":"")+n;}
return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); }
function marketStatus(){
var d=new Date(), day=d.getDay();
if(day===0||day===6) return {label:"휴장·주말", cls:"mkt-closed"};
var hols=(state.health&&state.health.market_holidays)||[];
if(hols.indexOf(ymdLocal(d))>=0) return {label:"휴장일", cls:"mkt-closed"};
var hm=d.getHours()*60+d.getMinutes();
if(hm < 8*60+30) return {label:"장 시작 전", cls:"mkt-pre"};
if(hm < 9*60)    return {label:"장전 동시호가", cls:"mkt-pre"};
if(hm <= 15*60+20) return {label:"장중", cls:"mkt-open"};
if(hm <= 15*60+30) return {label:"마감 동시호가", cls:"mkt-pre"};
return {label:"장 마감", cls:"mkt-closed"};
}

function mflowChartSVG(m){
var idx=m.index||[], osc=m.oscillator||[];
var hasIdx=idx.length>=3, hasOsc=osc.filter(function(x){return x!=null;}).length>=1;
if(!hasOsc){
return '<div class="note">오실레이터를 그릴 지수 데이터가 아직 없습니다. 라이브(야후/스투크) 연결 시 코스피 지수 RSI가 표시됩니다.'+
(m.cum_foreign&&m.cum_foreign.length?' 현재는 수급 누적만 표시합니다.':'')+'</div>'+supplySVG(m);
}
var W=600, IH=150, OH=150, P=36;
var n=osc.length;
// 지수 라인
var idxSvg='';
if(hasIdx){
var imin=Math.min.apply(null,idx), imax=Math.max.apply(null,idx); if(imin===imax)imax=imin+1;
var ix=function(i){return P+i*((W-2*P)/(idx.length-1));};
var iy=function(v){return 16+(1-(v-imin)/(imax-imin))*(IH-32);};
var ipath=idx.map(function(v,i){return (i?'L':'M')+ix(i).toFixed(1)+','+iy(v).toFixed(1);}).join(" ");
idxSvg='<svg viewBox="0 0 '+W+' '+IH+'" class="mflow-svg">'+
'<path d="'+ipath+'" fill="none" stroke="#5ad1c4" stroke-width="2"/>'+
'<text x="'+P+'" y="13" fill="#7d8aa0" font-size="10">'+(state.mflowMkt==="KOSDAQ"?"코스닥":"코스피")+' 지수 ('+idx.length+'일) · 최근 '+fmtNum(idx[idx.length-1])+'</text>'+
'</svg>';
}
// 오실레이터
var ox=function(i){return P+i*((W-2*P)/(n-1));};
var oy=function(v){return 18+(1-(v/100))*(OH-36);};
var pts=[]; for(var i=0;i<n;i++){ if(osc[i]!=null) pts.push(ox(i).toFixed(1)+','+oy(osc[i]).toFixed(1)); }
var opath=pts.length?('M'+pts.join(" L")):'';
var lastOsc=null; for(var k=osc.length-1;k>=0;k--){if(osc[k]!=null){lastOsc=osc[k];break;}}
var ostate=lastOsc==null?'':(lastOsc>=70?'과매수':(lastOsc<=30?'과매도':'중립'));
var ocolor=lastOsc>=70?'#ff6b6b':(lastOsc<=30?'#4a90e2':'#ffd479');
var oscSvg='<svg viewBox="0 0 '+W+' '+OH+'" class="mflow-svg osc">'+
'<rect x="'+P+'" y="'+oy(70).toFixed(1)+'" width="'+(W-2*P)+'" height="'+(oy(30)-oy(70)).toFixed(1)+'" fill="#16223a" opacity="0.5"/>'+
'<line x1="'+P+'" y1="'+oy(70).toFixed(1)+'" x2="'+(W-P)+'" y2="'+oy(70).toFixed(1)+'" stroke="#ff6b6b" stroke-width="0.8" stroke-dasharray="4 3"/>'+
'<line x1="'+P+'" y1="'+oy(50).toFixed(1)+'" x2="'+(W-P)+'" y2="'+oy(50).toFixed(1)+'" stroke="#2a3550" stroke-width="0.6"/>'+
'<line x1="'+P+'" y1="'+oy(30).toFixed(1)+'" x2="'+(W-P)+'" y2="'+oy(30).toFixed(1)+'" stroke="#4a90e2" stroke-width="0.8" stroke-dasharray="4 3"/>'+
(opath?'<path d="'+opath+'" fill="none" stroke="'+ocolor+'" stroke-width="2.4"/>':'')+
'<text x="'+(W-P-2)+'" y="'+(oy(70)-3).toFixed(1)+'" fill="#ff6b6b" font-size="8" text-anchor="end">70 과매수</text>'+
'<text x="'+(W-P-2)+'" y="'+(oy(30)+9).toFixed(1)+'" fill="#4a90e2" font-size="8" text-anchor="end">30 과매도</text>'+
'<text x="'+P+'" y="13" fill="#7d8aa0" font-size="10">오실레이터 RSI(14)</text>'+
'</svg>';
var gauge='<div class="osc-gauge">현재 오실레이터 <b style="color:'+ocolor+'">'+(lastOsc==null?'—':lastOsc)+'</b> <span class="osc-state" style="color:'+ocolor+'">'+esc(ostate)+'</span></div>';
return gauge+idxSvg+oscSvg+supplySVG(m)+
'<div class="note" style="margin-top:8px">오실레이터는 <b>코스피 지수 종가의 RSI(14)</b>입니다. 70 이상이면 과매수(단기 과열), 30 이하면 과매도 신호로 봅니다. 아래는 적재 종목들의 외국인·기관 순매수 합산(수급 연결). 투자판단 참고용입니다.</div>';
}
function supplySVG(m){
var dates=m.dates||[], fore=m.foreign||[], inst=m.inst||[], cum=m.cum_foreign||[];
if(!dates.length) return '';
var W=600,H=120,P=36,n=dates.length;
var bmax=Math.max(1,Math.max.apply(null,fore.concat(inst).map(Math.abs)));
var bw=(W-2*P)/n, z=H/2;
var bars='';
for(var i=0;i<n;i++){
var fy=z-(fore[i]/bmax)*(z-16);
bars+='<rect x="'+(P+i*bw+bw*0.15).toFixed(1)+'" y="'+Math.min(z,fy).toFixed(1)+'" width="'+(bw*0.34).toFixed(1)+'" height="'+Math.abs(z-fy).toFixed(1)+'" fill="'+(fore[i]>=0?'#ff6b6b':'#4a90e2')+'" opacity="0.85"/>';
var iy=z-(inst[i]/bmax)*(z-16);
bars+='<rect x="'+(P+i*bw+bw*0.5).toFixed(1)+'" y="'+Math.min(z,iy).toFixed(1)+'" width="'+(bw*0.34).toFixed(1)+'" height="'+Math.abs(z-iy).toFixed(1)+'" fill="'+(inst[i]>=0?'#ffb84d':'#6fa8ff')+'" opacity="0.7"/>';
}
return '<div class="mflow-legend" style="margin-top:6px"><span><i style="background:#ff6b6b"></i>외국인</span><span><i style="background:#ffb84d"></i>기관</span> 일별 순매수(억) · '+(m.symbols||0)+'종 합산</div>'+
'<svg viewBox="0 0 '+W+' '+H+'" class="mflow-svg">'+
'<line x1="'+P+'" y1="'+z+'" x2="'+(W-P)+'" y2="'+z+'" stroke="#2a3550" stroke-width="1"/>'+bars+'</svg>';
}

function calMonthLabel(y,m){ return y+'년 '+m+'월'; }
function calendarHTML(){
var c=state.cal;
var now=new Date();
var y=state.calY||now.getFullYear();
var m=state.calM||(now.getMonth()+1);
var head='<div class="cal-head"><button class="cal-nav" data-action="cal-prev">‹</button>'+
'<span class="cal-title">'+calMonthLabel(y,m)+'</span>'+
'<button class="cal-nav" data-action="cal-next">›</button></div>';
// 이벤트 맵 (필터 적용)
var evMap={};
var todayStr='';
var filteredEvents=[];
if(c && c.year===y && c.month===m){
todayStr=c.today||'';
(c.events||[]).forEach(function(e){
if(state.calFilter[e.type]) return;  // off된 유형 제외
filteredEvents.push(e);
(evMap[e.date]=evMap[e.date]||[]).push(e);
});
}
// 달력 그리드 — 요일헤더 + 빈칸 + 날짜를 '하나의 그리드'에 넣어 컬럼 정렬을 보장
var first=new Date(y,m-1,1);
var startDow=first.getDay();           // 0=일
var daysInMonth=new Date(y,m,0).getDate();
var dows=['일','월','화','수','목','금','토'];
// 1) 요일 헤더 7칸(그리드 첫 줄)
var cells=dows.map(function(d,i){
return '<div class="cal-dcell'+(i===0?' sun':(i===6?' sat':''))+'">'+d+'</div>';
}).join('');
// 2) 1일 앞 빈칸
for(var i=0;i<startDow;i++){ cells+='<div class="cal-cell empty"></div>'; }
// 3) 날짜칸
for(var d=1;d<=daysInMonth;d++){
var ds=y+'-'+(m<10?'0'+m:m)+'-'+(d<10?'0'+d:d);
var evs=evMap[ds]||[];
var dow=new Date(y,m-1,d).getDay();
var dots=evs.slice(0,3).map(function(e){return '<span class="cal-dot '+e.type+'"></span>';}).join('');
var isToday=(ds===todayStr);
var hol=evs.some(function(e){return e.type==='holiday';});
cells+='<div class="cal-cell'+(isToday?' today':'')+(hol?' holiday':'')+(dow===0?' sun':(dow===6?' sat':''))+(evs.length?' has':'')+'"'+
(evs.length?(' data-action="cal-day" data-d="'+ds+'"'):'')+'>'+
'<span class="cal-num">'+d+'</span>'+(dots?'<span class="cal-dots">'+dots+'</span>':'')+'</div>';
}
// 4) 뒤 빈칸 — 항상 6주(42칸)로 채워 매달 달력 크기를 동일하게(패널 고정)
var filled=startDow+daysInMonth;
for(var t=filled;t<42;t++){ cells+='<div class="cal-cell empty"></div>'; }
var grid='<div class="cal-grid cal-grid-6w">'+cells+'</div>';
// 이벤트 리스트(이번 달 전체)
var listItems='';
if(c && c.year===y && c.month===m && filteredEvents.length){
listItems=filteredEvents.map(function(e){
var dd=parseInt(e.date.slice(8,10),10);
var inner='<span class="cal-ev-d">'+dd+'일</span><span class="cal-ev-l">'+esc(e.label)+'</span>';
if(e.url){
return '<a class="cal-ev '+e.type+'" href="'+esc(e.url)+'" target="_blank" rel="noopener">'+inner+'</a>';
}
return '<div class="cal-ev '+e.type+'">'+inner+'</div>';
}).join('');
} else if(c && c.year===y && c.month===m){
listItems='<div class="cal-empty">이번 달 등록된 일정이 없습니다.</div>';
} else {
listItems='<div class="cal-empty">불러오는 중…</div>';
}

'<span><span class="cal-dot holiday"></span>휴장</span>'+
'<span><span class="cal-dot expiry"></span>만기</span>'+
'<span><span class="cal-dot dividend"></span>배당락</span>'+
'<span><span class="cal-dot econ"></span>금리·지표</span>'+
'<span><span class="cal-dot disclosure"></span>공시</span>'+

'<span><span class="cal-dot custom"></span>기타</span>'+
'</div>';
// 이번 주 요약 배너
var weekBanner='';
if(c && c.week && c.week.length){
weekBanner='<div class="cal-week"><div class="cal-week-h">📌 이번 주 주요 일정</div>'+

var filterBar='<div class="cal-filter">'+FILTERS.map(function(f){
var off=state.calFilter[f[0]];
return '<button class="cal-fchip '+f[0]+(off?' off':'')+'" data-action="cal-filter" data-f="'+f[0]+'">'+f[1]+'</button>';
}).join('')+'</div>';
var tools='<div class="cal-tools">'+
'<a class="cal-tool" href="'+API+'/api/calendar.ics?year='+y+'&month='+m+'" download title="구글/애플 캘린더에 추가">📥 iCal</a>'+

'</div>';
return '<div class="calwrap"><div class="label">📅 증시 캘린더</div>'+
head+weekBanner+grid+legend+filterBar+tools+
'<div class="cal-list">'+listItems+'</div>'+
'<div class="note" style="margin-top:10px">휴장일·선물옵션 만기일·배당락(참고)·금리결정·공시 등 공개 일정입니다. 투자 판단의 근거가 아닌 참고용입니다.</div>'+

function calcModalHTML(){
if(!state.calcOpen) return '';
var TABS=[["yield","💵 배당수익률"],["avg","📊 평단가"],["target","🎯 목표가"],
  ["compound","📈 복리"],["breakeven","⚖️ 손익분기"],["tax","🧾 세금·수수료"]];
var cur=state.calcTab||"yield";
var c=state.calcVals||{};
function val(k,d){ return (c[k]!=null && c[k]!=="")?c[k]:(d!=null?d:""); }
function inp(k,ph,d){ return '<input class="calc-in" data-calc-k="'+k+'" inputmode="decimal" placeholder="'+ph+'" value="'+esc(val(k,d))+'">'; }
function num(k,d){ var v=parseFloat(c[k]); return isNaN(v)?(d||0):v; }
var tabs=TABS.map(function(t){
  return '<button class="ce-tab'+(cur===t[0]?" on":"")+'" data-action="calc-tab" data-t="'+t[0]+'">'+t[1]+'</button>';
}).join("");
function row(label,field){ return '<div class="calc-row"><label>'+label+'</label>'+field+'</div>'; }
function result(html){ return '<div class="calc-result">'+html+'</div>'; }
function won(n){ return Math.round(n).toLocaleString()+'원'; }
function pct(n){ return (Math.round(n*100)/100)+'%'; }
var body='';

if(cur==="yield"){
  var price=num("y_price"), div=num("y_div");
  var dy = price>0 ? (div/price*100) : 0;
  body=row("현재 주가(원)",inp("y_price","예: 70000"))+
    row("주당 배당금(원)",inp("y_div","예: 1500"))+
    result(price>0?('시가배당률 <b>'+pct(dy)+'</b><div class="calc-sub">주가 '+won(price)+' 기준 주당 '+won(div)+' 배당 시</div>'):'주가와 배당금을 입력하세요');
}
else if(cur==="avg"){
  var q1=num("a_q1"),p1=num("a_p1"),q2=num("a_q2"),p2=num("a_p2");
  var tq=q1+q2, avg=tq>0?((q1*p1+q2*p2)/tq):0;
  body='<div class="calc-grid2">'+
    row("1차 수량",inp("a_q1","주"))+row("1차 단가",inp("a_p1","원"))+
    row("2차 수량",inp("a_q2","주"))+row("2차 단가",inp("a_p2","원"))+'</div>'+
    result(tq>0?('평균 단가 <b>'+won(avg)+'</b><div class="calc-sub">총 '+tq.toLocaleString()+'주 · 매입금액 '+won(q1*p1+q2*p2)+'</div>'):'수량과 단가를 입력하세요');
}
else if(cur==="target"){
  var tp=num("t_buy"), tr=num("t_ret"), tqty=num("t_qty");
  var goal = tp>0 ? tp*(1+tr/100) : 0;
  var profit = tp>0&&tqty>0 ? (goal-tp)*tqty : 0;
  body=row("매수 단가(원)",inp("t_buy","예: 50000"))+
    row("목표 수익률(%)",inp("t_ret","예: 20"))+
    row("보유 수량(주)",inp("t_qty","예: 100"))+
    result(tp>0&&tr>0?('목표 매도가 <b>'+won(goal)+'</b><div class="calc-sub">'+(tqty>0?('예상 수익 '+won(profit)+' (세전)'):'수량 입력 시 예상 수익 표시')+'</div>'):'매수가와 목표 수익률을 입력하세요');
}
else if(cur==="compound"){
  var P=num("c_p"),r=num("c_r"),y=num("c_y"),add=num("c_add");
  var bal=P, total=P;
  for(var i=0;i<y;i++){ bal=(bal+add)*(1+r/100); total+=add; }
  body=row("초기 투자금(원)",inp("c_p","예: 10000000"))+
    row("연 수익률(%)",inp("c_r","예: 8"))+
    row("투자 기간(년)",inp("c_y","예: 10"))+
    row("매년 추가납입(원)",inp("c_add","예: 0"))+
    result(P>0&&y>0?('예상 평가금액 <b>'+won(bal)+'</b><div class="calc-sub">총 납입 '+won(total)+' · 수익 '+won(bal-total)+'</div><div class="calc-warn">⚠ 단순 복리 가정. 실제 수익은 변동하며 보장되지 않습니다.</div>'):'값을 입력하세요');
}
else if(cur==="breakeven"){
  var bp=num("b_price"),fee=num("b_fee"),tax=num("b_tax");
  // 매수+매도 수수료 + 매도세(거래세). 손익분기가=매수가/(1 - 매도비용율) 근사
  var sellCost=(fee/100)+(tax/100); var buyCost=(fee/100);
  var be = bp>0 ? bp*(1+buyCost)/(1-sellCost) : 0;
  body=row("매수 단가(원)",inp("b_price","예: 50000"))+
    row("수수료율(편도 %)",inp("b_fee","예: 0.015","0.015"))+
    row("증권거래세(%)",inp("b_tax","예: 0.18","0.18"))+
    result(bp>0?('손익분기 매도가 <b>'+won(be)+'</b><div class="calc-sub">이 가격 이상 팔아야 수수료·세금 빼고 본전. 약 '+pct((be/bp-1)*100)+' 상승 필요</div>'):'매수 단가를 입력하세요');
}
else if(cur==="tax"){
  var amt=num("t_div"); // 배당소득세
  var dtax=amt*0.154; // 15.4%(소득세14%+지방세1.4%)
  var sell=num("t_sell"); // 매도금액
  var stax=sell*0.0018; // 거래세 0.18%
  body='<div class="calc-sec">배당소득세(15.4%)</div>'+
    row("배당금(원)",inp("t_div","예: 1000000"))+
    (amt>0?result('세금 <b>'+won(dtax)+'</b> · 실수령 '+won(amt-dtax)):'')+
    '<div class="calc-sec" style="margin-top:14px">증권거래세(매도 0.18%)</div>'+
    row("매도금액(원)",inp("t_sell","예: 5000000"))+
    (sell>0?result('거래세 <b>'+won(stax)+'</b>'):'')+
    '<div class="calc-warn">⚠ 2026년 기준 단순 계산(금융투자소득세·대주주 요건·종합과세 등 미반영). 실제는 세무 전문가 확인.</div>';
}

var cmini=state.calcMin?' ce-min':'';
var cpos=state.calcPos;
var cstyle='width:'+(state.calcW||520)+'px;'+
  (cpos?('position:fixed;left:'+cpos.x+'px;top:'+cpos.y+'px;margin:0;transform:none;'):'');
return '<div class="floatwrap'+cmini+'"><div class="modal calc-float float-win'+cmini+'" data-stop="1" data-poskey="calcPos" style="'+cstyle+'">'+
  '<div class="modal-h calc-head float-drag"><b>🧮 투자 계산기</b>'+
    '<span class="ce-winbtns">'+
      '<button class="ce-winbtn" data-action="calc-min" title="'+(state.calcMin?'확장':'축소')+'">'+(state.calcMin?'⊡':'⊟')+'</button>'+
      '<button class="ce-winbtn" data-action="calc-close" title="닫기">✕</button>'+
    '</span></div>'+
  (state.calcMin?'':(
    '<div class="ce-tabs calc-tabs">'+tabs+'</div>'+
    '<div class="calc-body">'+body+'</div>'+
    '<div class="calc-foot">모든 계산은 참고용이며 투자 권유가 아닙니다. 입력값은 저장되지 않습니다.</div>'+
    '<div class="calc-resize" data-action="calc-resize"></div>'
  ))+
  '</div></div>';
}

function adminModerate(action, tt, tid, rid, resolveOnly){
var payload = resolveOnly ? {action:"resolve_only", target_type:tt, target_id:tid, report_id:rid}
: {action:action, target_type:tt, target_id:tid, report_id:rid};
// resolve_only는 백엔드에서 hide/unhide가 아니므로, 처리완료만: report_id로 resolve
if(resolveOnly){
// 숨김 없이 신고만 처리완료 → moderate에 action 없이 report_id만? 백엔드는 action 필요.
// 간단히: unhide(영향 없음) + report_id resolve
payload.action="unhide";
}
fetch(API+"/api/admin/moderate",{method:"POST",headers:{"Content-Type":"application/json","x-admin-token":state.adminToken||""},
body:JSON.stringify(payload)})
.then(function(r){ if(!r.ok) throw new Error("실패"); return r.json(); })
.then(function(){ loadAdminReports(); })
.catch(function(){ alert("처리 중 오류가 발생했습니다."); });
}

function macdSVG(macd, sig, hist){
var n=macd.length, W=560,H=130,P=34;
var vals=macd.concat(sig).concat(hist).filter(function(x){return x!=null;});
if(!vals.length) return '';
var mx=Math.max.apply(null,vals.map(Math.abs))||1;
function x(i){return P+i*((W-2*P)/(n-1));}
function y(v){return H/2 - (v/mx)*(H/2-16);}
var bars='';
for(var i=0;i<n;i++){ if(hist[i]==null) continue;
var hy=y(hist[i]), z=H/2;
bars+='<rect x="'+(x(i)-1.4).toFixed(1)+'" y="'+Math.min(z,hy).toFixed(1)+'" width="2.8" height="'+Math.abs(z-hy).toFixed(1)+'" fill="'+(hist[i]>=0?'#ff6b6b':'#4a90e2')+'" opacity="0.55"/>';
}
function pathOf(s){var p=[];for(var i=0;i<n;i++){if(s[i]!=null)p.push(x(i).toFixed(1)+','+y(s[i]).toFixed(1));}return p.length?('M'+p.join(" L")):'';}
return '<div class="osc-sec-h">MACD(12,26,9) — 선 교차로 추세 전환 · 막대=히스토그램</div>'+
'<svg viewBox="0 0 '+W+' '+H+'" class="mflow-svg">'+
'<line x1="'+P+'" y1="'+(H/2)+'" x2="'+(W-P)+'" y2="'+(H/2)+'" stroke="#2a3550" stroke-width="0.8"/>'+
bars+
(pathOf(macd)?'<path d="'+pathOf(macd)+'" fill="none" stroke="#ffd479" stroke-width="2"/>':'')+
(pathOf(sig)?'<path d="'+pathOf(sig)+'" fill="none" stroke="#ff9a5a" stroke-width="1.6" stroke-dasharray="3 2"/>':'')+
'</svg>';
}
function stochSVG(k, d){
var n=k.length, W=560,H=130,P=34;
function x(i){return P+i*((W-2*P)/(n-1));}
function y(v){return 16+(1-v/100)*(H-32);}
function pathOf(s){var p=[];for(var i=0;i<n;i++){if(s[i]!=null)p.push(x(i).toFixed(1)+','+y(s[i]).toFixed(1));}return p.length?('M'+p.join(" L")):'';}
return '<div class="osc-sec-h">스토캐스틱 %K(노랑)·%D(주황) — 과매수 80 / 과매도 20</div>'+
'<svg viewBox="0 0 '+W+' '+H+'" class="mflow-svg osc">'+
'<rect x="'+P+'" y="'+y(80).toFixed(1)+'" width="'+(W-2*P)+'" height="'+(y(20)-y(80)).toFixed(1)+'" fill="#16223a" opacity="0.5"/>'+
'<line x1="'+P+'" y1="'+y(80).toFixed(1)+'" x2="'+(W-P)+'" y2="'+y(80).toFixed(1)+'" stroke="#ff6b6b" stroke-width="0.8" stroke-dasharray="4 3"/>'+
'<line x1="'+P+'" y1="'+y(20).toFixed(1)+'" x2="'+(W-P)+'" y2="'+y(20).toFixed(1)+'" stroke="#4a90e2" stroke-width="0.8" stroke-dasharray="4 3"/>'+
(pathOf(k)?'<path d="'+pathOf(k)+'" fill="none" stroke="#ffd479" stroke-width="2"/>':'')+
(pathOf(d)?'<path d="'+pathOf(d)+'" fill="none" stroke="#ff9a5a" stroke-width="1.6" stroke-dasharray="3 2"/>':'')+
'</svg>';
}

(function(){
  // 리사이즈 핸들이 없는 모달에 자동으로 붙인다(렌더 후마다 호출됨)
  window.__ensureWinHandles=function(){
    var modals=document.querySelectorAll(".modal");
    for(var i=0;i<modals.length;i++){
      var m=modals[i];
      // 제목줄을 드래그 핸들로 표시
      var head=m.querySelector(".modal-h");
      if(head && !head.classList.contains("win-drag")){ head.classList.add("win-drag"); }
      // 리사이즈 핸들 자동 추가(없으면)
      if(!m.querySelector(".win-resize")){
        var rz=document.createElement("div");
        rz.className="win-resize";
        m.appendChild(rz);
      }
    }
  };

  var drag=null;
  function down(e){
    var h=e.target.closest && (e.target.closest(".win-drag") || e.target.closest(".float-drag"));
    if(!h) return;
    if(e.target.closest(".modal-x") || e.target.closest(".ce-winbtn") || e.target.closest("button")) return;

    drag={win:win, dx:pt.clientX-r.left, dy:pt.clientY-r.top, key:win.getAttribute("data-poskey")};
    win.style.transition="none";
    e.preventDefault();
  }
  function move(e){
    if(!drag) return;
    var pt=e.touches?e.touches[0]:e;
    var x=pt.clientX-drag.dx, y=pt.clientY-drag.dy;
    x=Math.max(-240,Math.min(x,(window.innerWidth||1000)-80));
    y=Math.max(0,Math.min(y,(window.innerHeight||800)-40));
    drag.win.style.position="fixed"; drag.win.style.margin="0"; drag.win.style.transform="none";
    drag.win.style.left=x+"px"; drag.win.style.top=y+"px";
    if(typeof state!=="undefined" && drag.key){ state[drag.key]={x:Math.round(x),y:Math.round(y)}; }
  }

}

L.push("> 가중치: 규칙 기반 기본값(통계 보정 전).");
L.push("- 핵심 근거:");
rec.fired.forEach(function(s){
var ev=Object.keys(s.evidence).filter(function(k){return !Array.isArray(s.evidence[k]);})
.map(function(k){return evKo(k)+"="+s.evidence[k];}).join(", ");
L.push("    · "+sigKo(s.name)+"="+s.value.toFixed(2)+" "+ev); });
if(rec.abstained.length){ L.push("- 보류·미확인:");
rec.abstained.forEach(function(a){ L.push("    · "+sigKo(a.name)+": "+a.abstain_reason); }); }
L.push("- 리스크: "+(rec.risk_flags.length?rec.risk_flags.join(", "):"특이사항 없음(데이터 기준)"));
L.push("- 요약: 위 근거는 데이터 기반 사실이며, 투자 판단·자문이 아닙니다.");
return L.join("\n");
}

function sampleDiag(rec){
var W={ma_alignment:0.25,foreign_inst_streak:0.25,volume_breakout:0.20,news_sentiment:0.15,risk_flags:0.15};
var sigs=[]; var num=0,den=0;
rec.fired.forEach(function(s){
var w=W[s.name]||0.2, c=w*s.value*s.confidence; num+=c; den+=w*s.confidence;
sigs.push({name:s.name,fired:true,value:s.value,confidence:s.confidence,weight:w,
weighted_contribution:Math.round(c*1e4)/1e4,evidence:s.evidence,required_data:{}}); });
rec.abstained.forEach(function(a){
sigs.push({name:a.name,fired:false,value:null,confidence:0,weight:W[a.name]||0.2,
weighted_contribution:0,abstain_reason:a.abstain_reason,required_data:{}}); });
var raw=den>0?num/den:0;
var agr=Math.min(1,Math.sqrt(rec.coverage>0?rec.confidence/rec.coverage:0));
var frs=Math.min(1,(rec.coverage>0?rec.confidence/rec.coverage:0)/(agr||1));
return {symbol:rec.symbol,name:rec.name,horizon:rec.horizon,in_universe:true,
weights_source:"rule-based default v1",weights_calibrated:false,weights:W,signals:sigs,
score_math:{formula:"raw=Σ(weight·value·confidence)/Σ(weight·confidence)",
numerator:Math.round(num*1e4)/1e4,denominator:Math.round(den*1e4)/1e4,raw_score_0_1:raw,
note:"최종 점수는 유니버스 내 백분위(0~100)로 환산"},
confidence_math:{formula:"confidence = coverage × agreement × freshness",
coverage:rec.coverage,agreement:agr,freshness:frs,confidence:rec.confidence}};
}
